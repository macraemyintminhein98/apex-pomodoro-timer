<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Apex Pomodoro</title><meta name="description" content="A minimalist Pomodoro timer to boost your focus."><link rel="manifest" href="/manifest.json"><style>body{font-family:'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Open Sans','Helvetica Neue',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#282c34;color:#61dafb;user-select:none;}#timer{font-size:4em;margin-bottom:20px;}button{background:#61dafb;color:#282c34;border:none;padding:10px 20px;margin:5px;border-radius:5px;cursor:pointer;font-size:1.2em;}button:hover{opacity:0.9;}#controls{display:flex;}.buy-button{background:#4CAF50;color:white;}footer{margin-top:20px;font-size:0.8em;opacity:0.7;}@media(max-width:600px){#timer{font-size:3em;}button{padding:8px 15px;font-size:1em;}}</style></head><body><h1>Apex Pomodoro</h1><div id="timer"></div><div id="controls"><button id="startBtn">Start</button><button id="pauseBtn">Pause</button><button id="resetBtn">Reset</button></div><div id="buyButtonContainer" style="margin-top:20px;"></div><footer><span>&copy; APEX Digital Products</span></footer><script src="https://js.stripe.com/v3/"></script><script>let timerId;let timeLeft;let isRunning=false;const workTime=25*60;const breakTime=5*60;let isWorking=true;const timerDisplay=document.getElementById('timer');const startBtn=document.getElementById('startBtn');const pauseBtn=document.getElementById('pauseBtn');const resetBtn=document.getElementById('resetBtn');const buyButtonContainer=document.getElementById('buyButtonContainer');const publishableKey='pk_test_...';const stripe=Stripe(publishableKey);const productPrice=9.99;async function checkout(){const response=await fetch('/create-checkout-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({price:productPrice})});const session=await response.json();const result=await stripe.redirectToCheckout({sessionId:session.id});if(result.error){alert(result.error.message);}}function formatTime(seconds){const minutes=Math.floor(seconds/60);const remainingSeconds=seconds%60;return `${minutes.toString().padStart(2,'0')}:${remainingSeconds.toString().padStart(2,'0')}`;}function updateDisplay(){timerDisplay.textContent=formatTime(timeLeft);}function startTimer(){if(!isRunning){isRunning=true;timerId=setInterval(()=>{timeLeft--;if(timeLeft<0){clearInterval(timerId);isRunning=false;isWorking=!isWorking;timeLeft=isWorking?workTime:breakTime;alert(isWorking?'Time for work!':'Time for a break!');startTimer();}updateDisplay();},1000);}}function pauseTimer(){clearInterval(timerId);isRunning=false;}function resetTimer(){clearInterval(timerId);isRunning=false;isWorking=true;timeLeft=workTime;updateDisplay();}startBtn.addEventListener('click',startTimer);pauseBtn.addEventListener('click',pauseTimer);resetBtn.addEventListener('click',resetTimer);if('serviceWorker'in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').then(reg=>console.log('SW registered!',reg)).catch(err=>console.log('SW failed!',err));});}resetTimer();const buyBtn=document.createElement('button');buyBtn.className='buy-button';buyBtn.textContent='Buy Now - $' + productPrice;buyBtn.addEventListener('click',checkout);buyButtonContainer.appendChild(buyBtn);</script></body></html>
